services:
  mysql_db:
    image: mysql:8.0
    container_name: b2b_mysql
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=12345
      - MYSQL_DATABASE=efloristeria
    ports:
      - "3308:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql

  back_efloristeria:
    container_name: back_efloristeria
    build: .
    restart: always
    depends_on:
      - mysql_db
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=mysql://root:12345@mysql_db:3308/efloristeria
      - JWT_KEY=dfri
